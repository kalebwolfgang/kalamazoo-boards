name: Weekly Boards Scraper
on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday at 9:00 AM ET (14:00 UTC)
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests
      - name: Run scraper
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/kalamazoo_boards_scraper.py
      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/ics/
          git diff --staged --quiet || git commit -m "auto: weekly scraper update $(date +'%Y-%m-%d')"
          git push
